<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Arena – Tabla de Posiciones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

  <!-- ── HEADER ── -->
  <header>
    <div class="logo-wrap">
      <img src="assets/logo.png" alt="AI Arena">
    </div>
    <span class="edition-badge" id="hd-edition"></span>
    <div class="divider"></div>
  </header>

  <!-- ── INFO STRIP ── -->
  <div class="info-strip" id="info-strip"></div>

  <!-- ── VIDEO ── -->
  <p class="section-label">Video Oficial</p>
  <div class="video-wrap" id="video-section"></div>

  <!-- ── DESCRIPTIONS ── -->
  <p class="section-label">Acerca del Evento</p>
  <div class="event-block" id="event-desc"></div>
  <div class="event-block" id="event-extra" style="margin-bottom:2.5rem"></div>

</div>

<!-- ── MAIN SPLIT: leaderboard | arena | detail table ── -->
<div class="full-container">
  <p class="section-label" style="margin-bottom:1.2rem">Competidores &amp; Posiciones</p>

  <div class="main-split">

    <!-- LEFT: leaderboard (sorted by total, highest first) -->
    <div class="lb-column" id="lb-column"></div>

    <!-- CENTER: arena -->
    <div class="arena-column">

      <!-- Operators shown above the character when a slot is selected -->
      <div class="ops-bar" id="ops-bar"></div>

      <div class="arena-row">
        <div class="arena-col-left"  id="arena-left"></div>

        <div class="center-display" id="center-display">
          <img class="center-char-img" id="center-img" alt="">
          <div class="center-overlays">
            <div class="ai-name-display" id="ai-name"></div>
            <div class="choose-text"     id="choose-text">Choose your AI</div>
          </div>
          <!-- Designer credit shown below the character -->
          <div class="design-credit" id="design-credit"></div>
        </div>

        <div class="arena-col-right" id="arena-right"></div>
      </div>

    </div>

    <!-- RIGHT: detail table (sorted alphabetically) -->
    <div class="table-column">
      <div class="detail-table-wrap">
        <table class="detail-table" id="detail-table"></table>
      </div>
    </div>

  </div>
</div>

<!-- ── FOOTER ── -->
<div class="container">
  <footer>
    <span id="ft-org">AI Arena</span> &nbsp;·&nbsp; Todos los derechos reservados
  </footer>
</div>

<script src="app.js"></script>
</body>
</html>
