<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Arena – Leaderboard Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --red: #D42020;
            --red-rgb: 212, 32, 32; /* Crucial para que los rgba funcionen */
            --red-light: #FF4444;
            --red-dim: #8B1010;
            --bg: #0A0A0C;
            --bg-card: #131316;
            --bg-surface: #1A1A1F;
            --text: #F0EDE6;
            --text-muted: #8A8782;
            
            /* Variables dinámicas que el JS cambiará */
            --accent: var(--red);
            --accent-rgb: var(--red-rgb);
        }

        body {
            font-family: 'Exo 2', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Fondo con gradiente cyberpunk */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at 50% -5%, rgba(var(--red-rgb), 0.15), transparent 70%);
            pointer-events: none;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 2rem; position: relative; }

        /* --- Header --- */
        header { text-align: center; padding: 2rem 0; }
        .logo-placeholder { 
            font-family: 'Rajdhani'; font-size: 3rem; font-weight: 700; 
            color: var(--red); text-shadow: 0 0 20px rgba(var(--red-rgb), 0.5);
            text-transform: uppercase; letter-spacing: 5px;
        }
        .edition-badge {
            display: inline-block; border: 1px solid rgba(var(--red-rgb), 0.4);
            padding: 0.4rem 1.5rem; border-radius: 2rem; margin-top: 1rem;
            font-family: 'Rajdhani'; font-size: 0.9rem; color: var(--red-light);
            text-transform: uppercase; letter-spacing: 0.2em;
        }

        /* --- Arena de Competidores --- */
        .comp-arena {
            display: grid;
            grid-template-columns: 1fr 280px 1fr;
            gap: 1.5rem; align-items: center; margin: 3rem 0;
        }

        .cat-group { display: flex; flex-direction: column; gap: 1rem; }
        .cat-label { 
            font-family: 'Rajdhani'; font-weight: 700; color: var(--accent); 
            text-transform: uppercase; letter-spacing: 2px;
        }

        .cards-row { display: flex; transform: skewX(-10deg); }
        .char-card {
            width: 60px; height: 100px; background: var(--bg-surface);
            border: 2px solid rgba(255,255,255,0.1); margin-left: -10px;
            cursor: pointer; transition: 0.3s; overflow: hidden; position: relative;
        }
        .char-card:hover { 
            transform: translateY(-10px) scale(1.1); z-index: 10;
            border-color: var(--accent); box-shadow: 0 0 15px rgba(var(--accent-rgb), 0.5);
        }
        .char-card img { 
            width: 140%; height: 100%; object-fit: cover; transform: skewX(10deg) translateX(-15%);
        }

        .center-panel {
            height: 300px; border: 1px solid rgba(var(--accent-rgb), 0.3);
            border-radius: 1rem; background: var(--bg-card);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }

        /* --- Leaderboard --- */
        .board-entry {
            display: grid; grid-template-columns: 50px 60px 1fr 100px;
            align-items: center; gap: 1rem; background: var(--bg-card);
            padding: 1rem; border-radius: 0.5rem; margin-bottom: 0.8rem;
            border: 1px solid rgba(255,255,255,0.05); transition: 0.2s;
        }
        .board-entry:hover { border-color: var(--red); transform: translateX(5px); }
        .rank-num { font-family: 'Rajdhani'; font-size: 1.5rem; font-weight: 700; color: var(--text-muted); }
        .rank-1 .rank-num { color: gold; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        
        .team-img { width: 50px; height: 50px; border-radius: 50%; background: #333; }
        .bar-track { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-top: 8px; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, var(--red-dim), var(--red)); border-radius: 3px; transition: width 1s ease-out; }

        .points-num { font-family: 'Rajdhani'; font-size: 1.8rem; font-weight: 700; text-align: right; }

        @media (max-width: 768px) {
            .comp-arena { grid-template-columns: 1fr; }
            .center-panel { height: 150px; order: -1; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-placeholder">AI ARENA</div>
        <div class="edition-badge">Business Analytics en Acción 2026</div>
    </header>

    <section class="comp-arena">
        <div class="cat-group">
            <span class="cat-label">Group Alpha</span>
            <div class="cards-row">
                <div class="char-card" onmouseover="focusChar('Analista Pro', '#44aaff')" onmouseout="resetChar()"><img src="https://via.placeholder.com/100x150/111" alt="C1"></div>
                <div class="char-card" onmouseover="focusChar('Data Ninja', '#ffaa44')" onmouseout="resetChar()"><img src="https://via.placeholder.com/100x150/222" alt="C2"></div>
            </div>
        </div>

        <div class="center-panel" id="main-display">
            <span id="display-text" style="color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px;">Selecciona un Experto</span>
            <h2 id="display-name" style="font-family: 'Rajdhani'; font-size: 2rem; display: none;"></h2>
        </div>

        <div class="cat-group" style="align-items: flex-end;">
            <span class="cat-label">Group Beta</span>
            <div class="cards-row" style="transform: skewX(10deg);">
                <div class="char-card" onmouseover="focusChar('AI Strategist', '#aa44ff')" onmouseout="resetChar()"><img src="https://via.placeholder.com/100x150/333" alt="C3"></div>
                <div class="char-card" onmouseover="focusChar('Logic Master', '#44ffaa')" onmouseout="resetChar()"><img src="https://via.placeholder.com/100x150/444" alt="C4"></div>
            </div>
        </div>
    </section>

    <div id="leaderboard">
        <h3 style="font-family: 'Rajdhani'; margin-bottom: 1rem; color: var(--red);">TABLA DE POSICIONES</h3>
        </div>
</div>

<script>
    // Datos de ejemplo para la tabla
    const teams = [
        { name: "Team Molto", points: 950, img: "TM" },
        { name: "Alpha Analytics", points: 820, img: "AA" },
        { name: "Data Wizards", points: 740, img: "DW" },
        { name: "Insight Hunters", points: 610, img: "IH" }
    ];

    function renderLeaderboard() {
        const board = document.getElementById('leaderboard');
        const maxPoints = Math.max(...teams.map(t => t.points));

        teams.sort((a, b) => b.points - a.points).forEach((team, index) => {
            const percentage = (team.points / maxPoints) * 100;
            const entry = document.createElement('div');
            entry.className = `board-entry ${index === 0 ? 'rank-1' : ''}`;
            entry.innerHTML = `
                <div class="rank-num">#${index + 1}</div>
                <div class="team-img" style="display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:0.8rem; background:#25252b">${team.img}</div>
                <div class="team-info">
                    <div style="font-weight:600">${team.name}</div>
                    <div class="bar-track"><div class="bar-fill" style="width: ${percentage}%"></div></div>
                </div>
                <div class="points-num">${team.points}</div>
            `;
            board.appendChild(entry);
        });
    }

    // Lógica visual de los personajes
    const root = document.documentElement;
    const displayName = document.getElementById('display-name');
    const displayText = document.getElementById('display-text');

    function focusChar(name, color) {
        // Cambiar color de acento dinámicamente
        root.style.setProperty('--accent', color);
        // Convertir Hex a RGB simple para el resplandor
        const rgb = color === '#44aaff' ? '68, 170, 255' : '170, 68, 255'; 
        root.style.setProperty('--accent-rgb', rgb);

        displayText.style.display = 'none';
        displayName.innerText = name;
        displayName.style.display = 'block';
        displayName.style.color = color;
    }

    function resetChar() {
        root.style.setProperty('--accent', 'var(--red)');
        root.style.setProperty('--accent-rgb', 'var(--red-rgb)');
        displayText.style.display = 'block';
        displayName.style.display = 'none';
    }

    window.onload = renderLeaderboard;
</script>

</body>
</html>
