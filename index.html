<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Arena – Tabla de Posiciones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --red:#D42020;--red-light:#FF4444;--red-dim:#8B1010;--red-glow:rgba(212,32,32,.45);
  --bg:#0A0A0C;--bg-card:#131316;--bg-surface:#1A1A1F;
  --border:rgba(212,32,32,.2);--border-hi:rgba(212,32,32,.45);
  --text:#F0EDE6;--text-muted:#8A8782;--bar-bg:rgba(255,255,255,.07);
}

html{scroll-behavior:smooth}
body{font-family:'Exo 2',sans-serif;font-size:16px;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 70% 45% at 50% -5%,rgba(212,32,32,.09) 0%,transparent 65%),
             radial-gradient(ellipse 35% 35% at 85% 85%,rgba(212,32,32,.04) 0%,transparent 60%);
  pointer-events:none;z-index:0}

.container{max-width:960px;margin:0 auto;padding:0 1.5rem;position:relative;z-index:1}
.full-container{max-width:1400px;margin:0 auto;padding:0 1rem;position:relative;z-index:1}

/* ── Header ── */
header{padding:3rem 0 1.2rem;text-align:center}
.logo-wrap img{max-width:360px;width:80vw;height:auto}
.edition-badge{display:inline-block;border:.5px solid var(--border-hi);padding:.3rem 1.1rem;border-radius:2rem;margin-top:.9rem;
  font-family:'Rajdhani',sans-serif;font-size:.82rem;color:var(--red-light);letter-spacing:.2em;text-transform:uppercase}
.divider{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--red),transparent);margin:1.4rem auto}

/* ── Info strip ── */
.info-strip{display:flex;flex-wrap:wrap;gap:.8rem;justify-content:center;padding-bottom:2rem}
.info-chip{background:var(--bg-card);border:.5px solid var(--border);border-radius:.5rem;padding:.65rem 1.1rem}
.info-chip .label{color:var(--text-muted);font-size:.7rem;text-transform:uppercase;letter-spacing:.15em;font-family:'Rajdhani',sans-serif}
.info-chip .value{color:var(--text);font-weight:500;font-size:.9rem}

/* ── Section label ── */
.section-label{font-family:'Rajdhani',sans-serif;font-size:.75rem;font-weight:600;letter-spacing:.28em;
  text-transform:uppercase;color:var(--red-light);margin-bottom:1rem;
  display:flex;align-items:center;gap:.75rem}
.section-label::after{content:'';flex:1;height:.5px;background:linear-gradient(90deg,var(--border),transparent)}

/* ── Video ── */
.video-wrap{background:var(--bg-card);border:.5px solid var(--border);border-radius:.75rem;overflow:hidden;margin-bottom:2.5rem}
.video-placeholder{aspect-ratio:16/7;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;
  cursor:pointer;background:var(--bg-surface);transition:background .2s}
.video-placeholder:hover{background:#1e1e26}
.play-btn{width:56px;height:56px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;
  transition:transform .2s;box-shadow:0 0 18px var(--red-glow)}
.video-placeholder:hover .play-btn{transform:scale(1.08);background:var(--red-light)}
.play-btn svg{margin-left:4px}
.video-title-text{font-size:.95rem;color:var(--text-muted);font-family:'Rajdhani',sans-serif;letter-spacing:.08em}
iframe.yt-iframe{width:100%;aspect-ratio:16/7;display:block;border:none}

/* ── Event description ── */
.event-block{background:var(--bg-card);border:.5px solid var(--border);border-radius:.75rem;
  padding:1.4rem 1.7rem;margin-bottom:.9rem;line-height:1.8}
.event-block p{font-size:.95rem;color:#C8C5BE;font-weight:300}
.event-block p strong{color:var(--red-light);font-weight:600}

/* ══════════════════════════════════════════
   MAIN SPLIT LAYOUT
   [leaderboard | arena | detail-table]
══════════════════════════════════════════ */
.main-split{
  display:grid;
  grid-template-columns:280px 1fr 320px;
  gap:1.2rem;
  align-items:start;
  margin-bottom:3rem;
}

/* ══ LEFT: LEADERBOARD ══ */
.lb-column{
  display:flex;flex-direction:column;gap:.5rem;
  height:520px;
  overflow-y:auto;
  overflow-x:hidden;
  padding-right:.3rem;
}

.lb-entry{
  display:flex;align-items:center;gap:.7rem;
  border-radius:.6rem;padding:.55rem .75rem;
  cursor:pointer;transition:transform .15s,box-shadow .2s,border-color .2s;
  border:.5px solid transparent;
  background:var(--bg-card);
  animation:fadeUp .35s both;
}
.lb-entry:hover{transform:translateX(3px)}
.lb-entry.selected{transform:translateX(4px)}

/* top 4 — larger */
.lb-entry.top4{padding:.75rem .85rem;border-radius:.7rem}
.lb-entry.top4 .lb-avatar{width:3rem;height:3rem}
.lb-entry.top4 .lb-name{font-size:.95rem}
.lb-entry.top4 .lb-pts{font-size:1.4rem}
.lb-entry.top4 .lb-rank{font-size:1.3rem}

/* others */
.lb-entry:not(.top4) .lb-avatar{width:2.2rem;height:2.2rem}
.lb-entry:not(.top4) .lb-name{font-size:.78rem}
.lb-entry:not(.top4) .lb-pts{font-size:1.05rem}
.lb-entry:not(.top4) .lb-rank{font-size:1rem}

.lb-rank{font-family:'Rajdhani',sans-serif;font-weight:700;color:var(--text-muted);
  min-width:1.5rem;text-align:center;line-height:1}

.lb-avatar{border-radius:50%;overflow:hidden;border:1.5px solid rgba(255,255,255,.08);
  background:var(--bg-surface);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.7rem;color:var(--text-muted)}
.lb-avatar img{width:100%;height:100%;object-fit:cover;display:block}

.lb-info{flex:1;min-width:0}
.lb-name{font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:.03em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.lb-pts{font-family:'Rajdhani',sans-serif;font-weight:700;line-height:1;color:var(--text);white-space:nowrap}
.lb-pts-label{font-size:.58rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em;font-family:'Rajdhani',sans-serif}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ══ CENTER: ARENA ══ */
.arena-column{
  display:flex;flex-direction:column;align-items:center;gap:0;
  height:520px;
  overflow-y:auto;
  overflow-x:hidden;
}

/* Operators bar above center */
.ops-bar{
  width:100%;text-align:center;
  font-family:'Rajdhani',sans-serif;font-size:.82rem;font-weight:600;
  color:#ffffff;                  /* all names white */
  letter-spacing:.05em;
  padding:.4rem 0 .7rem;
  white-space:nowrap;
}
.ops-bar .ops-label{
  color:var(--red-light);
  letter-spacing:.18em;text-transform:uppercase;
  margin-right:.5em;font-weight:700;
}

/* Characters + center panel row */
.arena-row{
  display:flex;align-items:flex-end;justify-content:center;
  gap:0;position:relative;width:100%;
}

.arena-col-left{display:flex;flex-direction:column;gap:6.2rem;align-items:flex-end;padding-right:.3rem;position:relative;z-index:10}
.arena-col-right{display:flex;flex-direction:column;gap:6.2rem;align-items:flex-start;padding-left:.3rem;position:relative;z-index:10}


/* ── Diagonal card groups ── */
.cat-group{display:flex;flex-direction:column;gap:.4rem}
.arena-col-left  .cat-group{align-items:flex-start}
.arena-col-right .cat-group{align-items:flex-end}

.cat-label{
  font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;color:var(--red-light);
  text-shadow:0 0 10px var(--red-glow);
  position:relative;z-index:10
}

.cards-row{display:flex;align-items:flex-end}
.arena-col-left  .cards-row{transform:rotate(-8deg);transform-origin:center}
.arena-col-right .cards-row{transform:rotate( 8deg);transform-origin:center}

.char-card{
  width:58px;height:105px;
  transform:skewX(-14deg);
  border:2px solid rgba(255,255,255,.08);
  border-radius:4px;overflow:hidden;
  cursor:pointer;position:relative;z-index:11;
  transition:transform .22s,border-color .22s,box-shadow .22s;
  background-color:#000;
  background-size:auto 105px;
  background-repeat:no-repeat;
  margin-left:-10px;flex-shrink:0;
}
.char-card:first-child{margin-left:0}
.char-card:nth-child(2){z-index:12}
.char-card:nth-child(3){z-index:13}
.char-card:nth-child(4){z-index:14}
.char-card:hover{transform:skewX(-14deg) translateY(-10px) scale(1.08);z-index:20}
.arena-col-right .char-card{transform:skewX(14deg)}
.arena-col-right .char-card:hover{transform:skewX(14deg) translateY(-10px) scale(1.08)}

.card-inner{
  width:100%;height:100%;
  transform:skewX(14deg) scaleX(1.22);
  transform-origin:center;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.arena-col-right .card-inner{transform:skewX(-14deg) scaleX(1.22)}

.card-inner img{width:100%;height:100%;object-fit:cover;pointer-events:none}
.card-initials{
  font-family:'Rajdhani',sans-serif;font-size:.85rem;font-weight:700;color:var(--text-muted);
  display:none;align-items:center;justify-content:center;width:100%;height:100%;background:var(--bg-surface)
}

/* ── Center display — no box, natural image size ── */
.center-display{
  position: relative;
  height: 440px;        /* ajusta este valor al alto máximo de tus imágenes */
  width: 320px;         /* ajusta este valor al ancho máximo de tus imágenes */
  flex-shrink: 0;
  background: #000;     /* frame negro siempre visible */
  border-radius: .5rem;
  z-index: 1;           /* base — la imagen irá debajo de los slots */
  overflow: visible;
}

/* The actual character image — natural dimensions, no crop, no zoom */
.center-char-img{
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: auto;
  height: auto;
  max-height: 100%;
  object-fit: none;
  opacity: 0;
  transition: opacity .5s ease;
  pointer-events: none;
  z-index: 0;
}
.center-char-img.visible{opacity:1}

/* Overlay text sits on top of the image, centred */
.center-overlays{
  position:absolute;inset:0;z-index:10;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  pointer-events:none;
}

.choose-text{
  font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:600;
  letter-spacing:.22em;text-transform:uppercase;color:var(--text-muted);
  text-align:center;transition:opacity .3s;
  white-space:nowrap;
}

.ai-name-display{
  font-family:'Rajdhani',sans-serif;font-size:1.9rem;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;text-align:center;
  opacity:0;transition:opacity .3s;line-height:1;
  white-space:nowrap;
}
.ai-name-display.visible{opacity:1}

/* Design credit — bottom-right, below the image */
.design-credit{
  position:absolute;bottom:-1.5rem;left:50%;
  transform:translateX(-50%);
  font-family:'Exo 2',sans-serif;font-style:italic;font-weight:300;
  font-size:.68rem;color:var(--text-muted);letter-spacing:.04em;
  white-space:nowrap;z-index:12;
}

/* ══ RIGHT: DETAIL TABLE ══ */
.table-column{min-width:0}

.detail-table-wrap{
  background:var(--bg-card);border:.5px solid var(--border);
  border-radius:.75rem;overflow:auto;
  max-height:520px;
}

.detail-table{
  border-collapse:collapse;width:100%;
  font-family:'Rajdhani',sans-serif;font-size:.78rem;
}
.detail-table th{
  background:rgba(212,32,32,.12);
  color:var(--red-light);font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  padding:.6rem .7rem;text-align:center;border-bottom:.5px solid var(--border);
  position:sticky;top:0;white-space:nowrap;
}
.detail-table th:first-child{
  text-align:left;
  position:sticky;
  left:0;
  background:rgba(20,20,22,0.97);
  z-index:3;
}
.detail-table td{
  padding:.5rem .7rem;border-bottom:.5px solid rgba(255,255,255,.04);
  color:var(--text);text-align:center;transition:background .2s;
}
.detail-table td:first-child{
  text-align:left;font-weight:600;color:var(--text);
  position:sticky;
  left:0;
  background:#131316;
  z-index:2;
}
.detail-table tr:last-child td{border-bottom:none}
.detail-table tr:hover td{background:rgba(255,255,255,.03)}
.detail-table tr.row-selected td{background:rgba(212,32,32,.07)}
.detail-table .pts-cell{font-weight:700}
.detail-table .total-cell{font-weight:700;color:var(--red-light)}

/* ── Footer ── */
footer{border-top:.5px solid var(--border);padding:1.5rem 0 2.5rem;text-align:center;
  font-size:.75rem;color:var(--text-muted);font-family:'Rajdhani',sans-serif;letter-spacing:.1em;text-transform:uppercase}

/* ── Responsive ── */
@media(max-width:1100px){
  .main-split{grid-template-columns:240px 1fr 260px;gap:.8rem}
  .char-card{width:43px;height:80px}
  .cat-label{font-size:.95rem}
  .center-char-img{max-height:360px;max-width:280px}
}
@media(max-width:860px){
  .main-split{grid-template-columns:1fr;grid-template-rows:auto auto auto}
  .arena-col-left,.arena-col-right{flex-direction:row;flex-wrap:wrap;justify-content:center}
  .char-card{width:38px;height:70px}
  .center-char-img{max-height:280px;max-width:220px}
}
@media(max-width:520px){
  .lb-entry.top4 .lb-avatar{width:2.6rem;height:2.6rem}
  .lb-entry.top4 .lb-pts{font-size:1.2rem}
}
</style>
</head>

/* ════════════════════════════════════════════════════════════
   SONIDO — Para cambiar el sonido, reemplaza TODO el contenido
   dentro de las llaves de la función playHoverSound() con el
   código del sonido que prefieras del archivo sonidos.html
════════════════════════════════════════════════════════════ */
let _ac=null;
function playHoverSound(){
  try {
  if(!_ac) _ac=new(window.AudioContext||window.webkitAudioContext)();
  const o=_ac.createOscillator(),g=_ac.createGain();
  o.connect(g);g.connect(_ac.destination);
  o.type='triangle';
  o.frequency.setValueAtTime(660,_ac.currentTime);
  o.frequency.setValueAtTime(990,_ac.currentTime+.06);
  g.gain.setValueAtTime(0,_ac.currentTime);
  g.gain.linearRampToValueAtTime(.12,_ac.currentTime+.02);
  g.gain.exponentialRampToValueAtTime(.0001,_ac.currentTime+.22);
  o.start(_ac.currentTime);o.stop(_ac.currentTime+.22);
} catch(e) {}
}

/* ── Image loader (multi-format) ── */
function loadImg(imgEl,slot,onLoad,onFail){
  const exts=['jpg','jpeg','png','bmp','gif','webp'];let i=0;
  function next(){
    if(i>=exts.length){onFail&&onFail();return}
    imgEl.onload=()=>{onLoad&&onLoad(imgEl)};
    imgEl.onerror=next;
    imgEl.src='imagenes/Equipo-'+slot+'.'+exts[i++];
  }
  next();
}

/* ── State ── */
let selectedSlot=null;

/* ── Select / deselect a slot ── */
function selectSlot(slot){
  if(selectedSlot===slot){ deselect(); return; }
  selectedSlot=slot;
  const eq=slotMap[slot];
  const ia=IA[eq.ia]||DEF;

  playHoverSound();

  /* update center display */
  const cImg=document.getElementById('center-img');
  cImg.classList.remove('visible');
  loadImg(cImg,slot,el=>el.classList.add('visible'),()=>cImg.classList.remove('visible'));

  /* AI name */
  const nameEl=document.getElementById('ai-name');
  nameEl.textContent=ia.nombre;
  nameEl.style.color=ia.color;
  nameEl.style.textShadow='0 0 20px '+ia.color+',0 0 6px '+ia.color;
  nameEl.classList.add('visible');
  document.getElementById('choose-text').style.opacity='0';
  document.getElementById('ops-bar').style.opacity='1';
document.getElementById('design-credit').style.opacity='1';

  /* highlight cards */
  document.querySelectorAll('.char-card').forEach(c=>{
    const s=parseInt(c.dataset.slot);
    const ceq=slotMap[s];
    const cia=IA[ceq.ia]||DEF;
    if(s===slot){
      c.style.borderColor=cia.color;
      c.style.boxShadow='0 0 18px '+cia.glow;
    } else {
      c.style.borderColor=cia.color+'44';
      c.style.boxShadow='';
    }
  });

  /* highlight leaderboard row */
  document.querySelectorAll('.lb-entry').forEach(row=>{
    const s=parseInt(row.dataset.slot);
    const req=slotMap[s];
    const ria=IA[req.ia]||DEF;
    if(s===slot){
      row.style.borderColor=ria.color+'99';
      row.style.boxShadow='0 0 12px '+ria.glow2;
      row.style.background=ria.color+'14';
      row.classList.add('selected');
    } else {
      applyLbRowStyle(row,req,false);
    }
  });

  /* highlight detail table row */
  document.querySelectorAll('#detail-table tr.data-row').forEach(r=>{
    r.classList.toggle('row-selected',parseInt(r.dataset.slot)===slot);
  });
}

function deselect(){
  selectedSlot=null;
  /* hide center */
  document.getElementById('center-img').classList.remove('visible');
  document.getElementById('ai-name').classList.remove('visible');
  document.getElementById('ai-name').textContent='';
  document.getElementById('choose-text').style.opacity='1';
  document.getElementById('ops-bar').style.opacity='0';
document.getElementById('design-credit').style.opacity='0';

  /* reset cards */
  document.querySelectorAll('.char-card').forEach(c=>{
    const s=parseInt(c.dataset.slot);
    const ia=IA[slotMap[s].ia]||DEF;
    c.style.borderColor=ia.color+'44';
    c.style.boxShadow='';
  });

  /* reset leaderboard */
  document.querySelectorAll('.lb-entry').forEach(row=>{
    const s=parseInt(row.dataset.slot);
    applyLbRowStyle(row,slotMap[s],false);
  });

  /* reset detail table */
  document.querySelectorAll('#detail-table tr.data-row').forEach(r=>r.classList.remove('row-selected'));
}

/* ── Apply per-team IA style to leaderboard row ── */
function applyLbRowStyle(row,eq,force){
  const rank=parseInt(row.dataset.rank);
  const isFinal=rank<=4;
  const ia=IA[eq.ia]||DEF;
  row.classList.remove('selected');
  if(isFinal){
    row.style.borderColor=ia.color+'55';
    row.style.boxShadow='0 0 8px '+ia.glow2;
    row.style.background=ia.color+'0a';
  } else {
    row.style.borderColor='transparent';
    row.style.boxShadow='';
    row.style.background='';
  }
  const rankEl=row.querySelector('.lb-rank');
  if(rankEl) rankEl.style.color=isFinal?ia.color:'';
  const ptsEl=row.querySelector('.lb-pts');
  if(ptsEl) ptsEl.style.color=isFinal?ia.color:'';
  const avEl=row.querySelector('.lb-avatar');
  if(avEl) avEl.style.borderColor=isFinal?ia.color+'66':'rgba(255,255,255,.08)';
}

/* ── Build character card ── */
function buildCard(eq, bgImg, bgPos){
  const ia=IA[eq.ia]||DEF;
  const card=document.createElement('div');
  card.className='char-card';
  card.dataset.slot=eq.slot;
  card.style.borderColor=ia.color+'55';
  card.style.backgroundImage='url('+bgImg+')';
  card.style.backgroundPosition=bgPos;

  card.addEventListener('mouseenter',()=>selectSlot(eq.slot));
  card.addEventListener('mouseleave',()=>deselect());
  return card;
}

/* ── Render competitors ── */
const slotMap={};
function renderCompetitors(){
  DATA.equipos.forEach(e=>{slotMap[e.slot]=e});

  DATA.categorias.forEach(cat=>{
    const col=document.getElementById(cat.side==='left'?'arena-left':'arena-right');
    const group=document.createElement('div');group.className='cat-group';

    const lbl=document.createElement('div');lbl.className='cat-label';lbl.textContent=cat.label;
    group.appendChild(lbl);

    const row=document.createElement('div');row.className='cards-row';
    cat.slots.forEach((s, idx) => {
  const e = slotMap[s];
  if(e) row.appendChild(buildCard(e, cat.imagen, cat.bgPos[idx]));
});
    group.appendChild(row);col.appendChild(group);
  });

  /* Operators bar */
  const op=DATA.operadores;
document.getElementById('ops-bar').innerHTML=
    '<span class="ops-label">Operadores:</span>'+
    '<span>'+op.op1+', '+op.op2+' y '+op.op3+'</span>';
document.getElementById('ops-bar').style.opacity='0';
document.getElementById('ops-bar').style.transition='opacity .3s';

document.getElementById('design-credit').innerHTML='Diseño de personaje: <em>'+op.op3+'</em>';
document.getElementById('design-credit').style.opacity='0';
document.getElementById('design-credit').style.transition='opacity .3s';
}

/* ── Render leaderboard ── */
function renderLeaderboard(){
  const sorted=[...DATA.equipos].sort((a,b)=>b.puntos-a.puntos);
  const col=document.getElementById('lb-column');
  col.innerHTML='';

  sorted.forEach((eq,i)=>{
    const rank=i+1;
    const isFinal=rank<=4;
    const ia=IA[eq.ia]||DEF;
    const delay=(i*40)+'ms';

    const row=document.createElement('div');
    row.className='lb-entry'+(isFinal?' top4':'');
    row.dataset.slot=eq.slot;
    row.dataset.rank=rank;
    row.style.animationDelay=delay;

    const initials=eq.nombre.split(/\s+/).map(w=>w[0]).join('').substring(0,2).toUpperCase();

    row.innerHTML=
      '<div class="lb-rank">'+rank+'</div>'+
      '<div class="lb-avatar">'+
        '<img src="imagenes/equipo-'+eq.slot+'.jpg" alt="'+eq.nombre+'" '+
          'onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'">'+
        '<span style="display:none;width:100%;height:100%;align-items:center;justify-content:center">'+initials+'</span>'+
      '</div>'+
      '<div class="lb-info">'+
        '<div class="lb-name">'+eq.nombre+'</div>'+
        '<div class="lb-pts-label">pts</div>'+
      '</div>'+
      '<div><div class="lb-pts">'+eq.puntos.toLocaleString()+'</div></div>';

    applyLbRowStyle(row,eq,false);

    row.addEventListener('mouseenter',()=>selectSlot(eq.slot));
row.addEventListener('mouseleave',()=>deselect());
    row.addEventListener('mouseenter',()=>{
      if(parseInt(row.dataset.slot)===selectedSlot) return;
      row.style.borderColor=ia.color+'88';
      row.style.boxShadow='0 0 10px '+ia.glow2;
    });
    row.addEventListener('mouseleave',()=>{
      if(parseInt(row.dataset.slot)===selectedSlot) return;
      applyLbRowStyle(row,eq,false);
    });

    col.appendChild(row);
  });
}

/* ── Render detail table ── */
function renderDetailTable(){
  const sorted=[...DATA.equipos].sort((a,b)=>b.puntos-a.puntos);
  const n=DATA.numRetos;
  const tbl=document.getElementById('detail-table');

  /* Header */
  let head='<thead><tr><th>Equipo</th>';
  for(let r=1;r<=n;r++) head+='<th>Reto '+r+'</th>';
  head+='<th>Total</th></tr></thead>';

  /* Body */
  let body='<tbody>';
  sorted.forEach((eq,i)=>{
    const ia=IA[eq.ia]||DEF;
    body+='<tr class="data-row" data-slot="'+eq.slot+'" style="cursor:pointer" '+
      'onclick="selectSlot('+eq.slot+')">';
    body+='<td>'+eq.nombre+'</td>';
    for(let r=0;r<n;r++){
      const pts=eq.retos&&eq.retos[r]!=null?eq.retos[r]:'—';
      body+='<td class="pts-cell" style="color:'+ia.color+'">'+pts+'</td>';
    }
    body+='<td class="total-cell" style="color:'+ia.color+'">'+eq.puntos.toLocaleString()+'</td>';
    body+='</tr>';
  });
  body+='</tbody>';
  tbl.innerHTML=head+body;
}

/* ── Render page (header, chips, video, descriptions) ── */
function renderPage(){
  const{info,descripcion,infoAdicional}=DATA;
  document.getElementById('hd-edition').textContent=info.edition;
  document.getElementById('ft-org').textContent=info.organizer;

  document.getElementById('info-strip').innerHTML=[
    {label:'Sede',value:info.location},
    {label:'Horario',value:info.time},
    {label:'Equipos',value:DATA.equipos.length+' participantes'}
  ].filter(c=>c.value)
   .map(c=>'<div class="info-chip"><div class="label">'+c.label+'</div><div class="value">'+c.value+'</div></div>')
   .join('');

  const vs=document.getElementById('video-section');
  const yt=(info.youtube||'').match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/);
  vs.innerHTML=yt
    ?'<iframe class="yt-iframe" src="https://www.youtube.com/embed/'+yt[1]+'" title="'+(info.videoTitle||'Video')+'" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen loading="lazy"></iframe>'
    :'<div class="video-placeholder" onclick="window.open(\''+info.youtube+'\',\'_blank\')"><div class="play-btn"><svg width="20" height="20" viewBox="0 0 20 20" fill="#fff"><polygon points="6,3 17,10 6,17"/></svg></div><p class="video-title-text">'+(info.videoTitle||'Ver Video')+'</p></div>';

  document.getElementById('event-desc').innerHTML='<p>'+descripcion.trim()+'</p>';
  document.getElementById('event-extra').innerHTML='<p>'+infoAdicional.trim()+'</p>';
}

/* ── Init ── */
renderPage();
renderCompetitors();
renderLeaderboard();
renderDetailTable();
</script>
</body>
