<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Arena – Tabla de Posiciones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --red:       #D42020;
  --red-light: #FF4444;
  --red-dim:   #8B1010;
  --red-glow:  rgba(212,32,32,0.45);
  --red-glow2: rgba(212,32,32,0.18);
  --bg:        #0A0A0C;
  --bg-card:   #131316;
  --bg-surface:#1A1A1F;
  --border:    rgba(212,32,32,0.2);
  --border-hi: rgba(212,32,32,0.45);
  --text:      #F0EDE6;
  --text-muted:#8A8782;
  --bar-bg:    rgba(255,255,255,0.07);
  /* Dynamic accent (updated by JS on character hover) */
  --accent:        #D42020;
  --accent-light:  #FF4444;
  --accent-dim:    #8B1010;
  --accent-glow:   rgba(212,32,32,0.45);
  --accent-glow2:  rgba(212,32,32,0.18);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Exo 2', sans-serif;
  font-size: 17px;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 70% 45% at 50% -5%, rgba(212,32,32,0.09) 0%, transparent 65%),
    radial-gradient(ellipse 35% 35% at 85% 85%, rgba(212,32,32,0.04) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}

/* ── Layout ── */
.container { max-width: 900px; margin: 0 auto; padding: 0 1.5rem; position: relative; z-index: 1; }
.wide-container { max-width: 1060px; margin: 0 auto; padding: 0 1.5rem; position: relative; z-index: 1; }

/* ── Header ── */
header { padding: 3.5rem 0 1.5rem; text-align: center; }
.logo-wrap img { max-width: 380px; width: 85vw; height: auto; }
.edition-badge {
  display: inline-block;
  border: 0.5px solid var(--border-hi);
  padding: 0.35rem 1.2rem; border-radius: 2rem; margin-top: 1rem;
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.85rem; color: var(--red-light);
  letter-spacing: 0.2em; text-transform: uppercase;
}
.divider {
  width: 60px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--red), transparent);
  margin: 1.6rem auto;
}

/* ── Info strip ── */
.info-strip {
  display: flex; flex-wrap: wrap; gap: 0.9rem;
  justify-content: center; padding-bottom: 2.5rem;
}
.info-chip {
  background: var(--bg-card);
  border: 0.5px solid var(--border);
  border-radius: 0.5rem; padding: 0.7rem 1.2rem;
}
.info-chip .label {
  color: var(--text-muted); font-size: 0.72rem;
  text-transform: uppercase; letter-spacing: 0.15em;
  font-family: 'Rajdhani', sans-serif;
}
.info-chip .value { color: var(--text); font-weight: 500; font-size: 0.95rem; }

/* ── Section label ── */
.section-label {
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.78rem; font-weight: 600; letter-spacing: 0.28em;
  text-transform: uppercase; color: var(--red-light); margin-bottom: 1.1rem;
  display: flex; align-items: center; gap: 0.75rem;
}
.section-label::after {
  content: ''; flex: 1; height: 0.5px;
  background: linear-gradient(90deg, var(--border), transparent);
}

/* ── Video ── */
.video-wrap {
  background: var(--bg-card); border: 0.5px solid var(--border);
  border-radius: 0.75rem; overflow: hidden; margin-bottom: 3rem;
}
.video-placeholder {
  aspect-ratio: 16/7; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 1rem;
  cursor: pointer; background: var(--bg-surface); transition: background 0.2s;
}
.video-placeholder:hover { background: #1e1e26; }
.play-btn {
  width: 58px; height: 58px; border-radius: 50%; background: var(--red);
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s; box-shadow: 0 0 18px var(--red-glow);
}
.video-placeholder:hover .play-btn { transform: scale(1.08); background: var(--red-light); }
.play-btn svg { margin-left: 4px; }
.video-title-text { font-size: 1rem; color: var(--text-muted); font-family: 'Rajdhani', sans-serif; letter-spacing: 0.08em; }
iframe.yt-iframe { width: 100%; aspect-ratio: 16/7; display: block; border: none; }

/* ── Event description ── */
.event-info-section { margin-bottom: 3rem; }
.event-block {
  background: var(--bg-card); border: 0.5px solid var(--border);
  border-radius: 0.75rem; padding: 1.5rem 1.8rem; margin-bottom: 1rem;
  line-height: 1.8;
}
.event-block p { font-size: 1rem; color: #C8C5BE; font-weight: 300; }
.event-block p strong { color: var(--red-light); font-weight: 600; }

/* ══════════════════════════════════════════
   COMPETITORS SECTION
══════════════════════════════════════════ */
.competitors-section { margin-bottom: 3rem; }

.comp-arena {
  display: grid;
  grid-template-columns: 1fr 230px 1fr 150px;
  grid-template-areas: 'left center right ops';
  gap: 1.2rem;
  align-items: center;
}

/* Left / Right columns – each has 2 cat-groups stacked */
.comp-col {
  display: flex; flex-direction: column; gap: 2rem;
}

/* Category group (label + cards) */
.cat-group { display: flex; flex-direction: column; gap: 0.6rem; }
.comp-col-left .cat-group { align-items: flex-start; }
.comp-col-right .cat-group { align-items: flex-end; }

.cat-label {
  font-family: 'Rajdhani', sans-serif;
  font-size: 1.35rem; font-weight: 700; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--red-light);
  text-shadow: 0 0 12px var(--red-glow);
}

/* Diagonal cards row */
.cards-row {
  display: flex; align-items: flex-end;
  transform: rotate(-8deg);
  transform-origin: center center;
}
.comp-col-right .cards-row { transform: rotate(8deg); }

.char-card {
  width: 58px; height: 105px;
  transform: skewX(-14deg);
  border: 2px solid rgba(255,255,255,0.08);
  border-radius: 5px; overflow: hidden;
  cursor: pointer; position: relative; z-index: 1;
  transition: transform 0.22s, border-color 0.22s, box-shadow 0.22s;
  background: var(--bg-surface);
  margin-left: -12px;
  flex-shrink: 0;
}
.char-card:first-child { margin-left: 0; }
.char-card:nth-child(2) { z-index: 2; }
.char-card:nth-child(3) { z-index: 3; }
.char-card:nth-child(4) { z-index: 4; }

.char-card:hover {
  transform: skewX(-14deg) translateY(-12px) scale(1.06);
  z-index: 20;
}

.card-inner {
  width: 100%; height: 100%;
  transform: skewX(0deg) scaleX(1);
  transform-origin: center;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.card-inner img {
  width: 100%; height: 100%;
  object-fit: cover;
  pointer-events: none;
}
.card-initials {
  font-family: 'Rajdhani', sans-serif;
  font-size: 1.1rem; font-weight: 700;
  color: var(--text-muted);
  display: none; align-items: center; justify-content: center;
  width: 100%; height: 100%;
  background: var(--bg-surface);
}

/* ── Center Panel ── */
.comp-center { grid-area: center; display: flex; align-items: center; justify-content: center; }

.center-panel {
  width: 100%; height: 300px;
  border: 1px solid var(--border);
  border-radius: 0.75rem; overflow: hidden;
  position: relative;
  background: var(--bg-surface);
  transition: border-color 0.4s, box-shadow 0.4s;
}

.center-bg {
  position: absolute; inset: 0;
}
.center-bg img {
  width: 100%; height: 100%; object-fit: cover;
  opacity: 0; transition: opacity 0.4s;
}
.center-bg img.loaded { opacity: 0.8; }

.center-overlay {
  position: absolute; inset: 0; z-index: 2;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 0.5rem;
  background: linear-gradient(to top, rgba(10,10,12,0.75) 0%, transparent 60%);
}

.choose-text {
  font-family: 'Rajdhani', sans-serif;
  font-size: 1.1rem; font-weight: 600; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--text-muted);
  text-align: center;
}

.ai-name-display {
  font-family: 'Rajdhani', sans-serif;
  font-size: 2rem; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; text-align: center;
  opacity: 0; transition: opacity 0.3s;
  line-height: 1;
}
.ai-name-display.visible { opacity: 1; }

/* ── Operators panel ── */
.operators-panel {
  grid-area: ops;
  display: flex; flex-direction: column;
  justify-content: center; gap: 0.6rem;
  padding-left: 0.5rem;
  border-left: 1px solid var(--border);
  min-height: 260px;
}

.ops-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.8rem; font-weight: 700; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--red-light); margin-bottom: 0.4rem;
}

.ops-name {
  font-family: 'Rajdhani', sans-serif;
  font-size: 1rem; font-weight: 500; color: var(--text);
  letter-spacing: 0.05em;
}
.ops-name-3 { color: var(--red-light); }

.ops-credit {
  font-size: 0.72rem; color: var(--text-muted); margin-top: 1rem;
  line-height: 1.5; border-top: 0.5px solid var(--border); padding-top: 0.6rem;
  font-style: italic;
}
.ops-credit strong { color: var(--text-muted); }

/* ══════════════════════════════════════════
   LEADERBOARD
══════════════════════════════════════════ */
.leaderboard { padding-bottom: 4rem; }

.board-entry {
  display: grid;
  grid-template-columns: 2.8rem 3.8rem 1fr auto;
  align-items: center; gap: 1rem;
  background: var(--bg-card);
  border: 0.5px solid var(--border);
  border-radius: 0.75rem;
  padding: 1.1rem 1.3rem;
  margin-bottom: 0.85rem;
  transition: border-color 0.3s, transform 0.15s, box-shadow 0.3s;
  animation: fadeUp 0.4s both;
}
.board-entry:hover { border-color: var(--border-hi); transform: translateX(3px); }

.board-entry.finals {
  border-color: rgba(var(--accent-rgb, 212,32,32), 0.45);
  box-shadow:
    0 0 10px rgba(var(--accent-rgb, 212,32,32), 0.18),
    0 0 26px rgba(var(--accent-rgb, 212,32,32), 0.07),
    inset 0 0 20px rgba(var(--accent-rgb, 212,32,32), 0.04);
}
.board-entry.rank-1 { background: rgba(var(--accent-rgb, 212,32,32), 0.05); }

.finals-tag {
  display: none;
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.62rem; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--accent-light, var(--red-light));
  background: rgba(var(--accent-rgb, 212,32,32), 0.12);
  border: 0.5px solid rgba(var(--accent-rgb, 212,32,32), 0.3);
  padding: 0.18rem 0.5rem; border-radius: 3px;
  margin-top: 0.35rem; width: fit-content;
}
.board-entry.finals .finals-tag { display: block; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

.rank-num {
  font-family: 'Rajdhani', sans-serif;
  font-size: 1.5rem; font-weight: 700; text-align: center;
  color: var(--text-muted);
}
.board-entry.finals .rank-num {
  color: var(--accent-light, var(--red-light));
  text-shadow: 0 0 10px var(--accent-glow, var(--red-glow));
}

.team-avatar {
  width: 3.4rem; height: 3.4rem; border-radius: 50%; overflow: hidden;
  border: 1.5px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Rajdhani', sans-serif;
  font-size: 1.05rem; font-weight: 700;
  background: var(--bg-surface); flex-shrink: 0;
  color: var(--text-muted);
}
.board-entry.finals .team-avatar { border-color: rgba(var(--accent-rgb, 212,32,32), 0.4); }
.team-avatar img { width: 100%; height: 100%; object-fit: cover; }

.team-info { min-width: 0; }
.team-name {
  font-family: 'Rajdhani', sans-serif;
  font-size: 1.1rem; font-weight: 600; letter-spacing: 0.04em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 0.45rem;
}
.board-entry.rank-1 .team-name { color: #fff; }

.bar-track { height: 5px; background: var(--bar-bg); border-radius: 3px; overflow: hidden; }
.bar-fill {
  height: 100%; border-radius: 3px;
  background: linear-gradient(90deg, var(--accent-dim, var(--red-dim)), var(--accent, var(--red)));
  width: 0%; transition: width 1s cubic-bezier(0.22,1,0.36,1);
}
.board-entry.finals .bar-fill { box-shadow: 0 0 6px var(--accent-glow, var(--red-glow)); }

.points-col { text-align: right; }
.points-num {
  font-family: 'Rajdhani', sans-serif;
  font-size: 1.85rem; font-weight: 700; line-height: 1;
  color: var(--text);
}
.board-entry.finals .points-num {
  color: var(--accent-light, var(--red-light));
  text-shadow: 0 0 8px var(--accent-glow2, var(--red-glow2));
}
.points-label {
  font-size: 0.68rem; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.12em;
  font-family: 'Rajdhani', sans-serif;
}

/* ── Footer ── */
footer {
  border-top: 0.5px solid var(--border);
  padding: 1.5rem 0 2.5rem; text-align: center;
  font-size: 0.8rem; color: var(--text-muted);
  font-family: 'Rajdhani', sans-serif; letter-spacing: 0.1em; text-transform: uppercase;
}

/* ── Responsive ── */
@media (max-width: 760px) {
  .comp-arena {
    grid-template-columns: 1fr 160px 1fr;
    grid-template-areas: 'left center right' '. ops .';
  }
  .operators-panel {
    grid-area: ops; border-left: none; border-top: 1px solid var(--border);
    flex-direction: row; flex-wrap: wrap; align-items: center; gap: 1rem;
    padding: 1rem 0 0; min-height: unset;
  }
  .char-card { width: 46px; height: 84px; }
  .center-panel { height: 220px; }
}
@media (max-width: 520px) {
  .comp-arena {
    grid-template-columns: 1fr 130px 1fr;
    gap: 0.6rem;
  }
  .board-entry { grid-template-columns: 2.2rem 3rem 1fr auto; gap: 0.7rem; padding: 0.9rem; }
  .team-avatar { width: 3rem; height: 3rem; }
  .points-num { font-size: 1.45rem; }
  .char-card { width: 38px; height: 70px; }
  .cat-label { font-size: 1.05rem; }
  .center-panel { height: 180px; }
}
</style>
</head>

/* ── IA Configuration ── */
const IA_CONFIG = {
  'O': { nombre: 'ChatGPT', color: '#10a37f', dim: '#0a5c47', glow: 'rgba(16,163,127,0.45)',  glow2: 'rgba(16,163,127,0.2)',  rgb: '16,163,127'  },
  'A': { nombre: 'Claude',  color: '#f97316', dim: '#9a4a0a', glow: 'rgba(249,115,22,0.45)',  glow2: 'rgba(249,115,22,0.2)',  rgb: '249,115,22'  },
  'G': { nombre: 'Gemini',  color: '#a855f7', dim: '#6b21a8', glow: 'rgba(168,85,247,0.45)',  glow2: 'rgba(168,85,247,0.2)',  rgb: '168,85,247'  }
};
const DEFAULT_IA = { color: '#D42020', dim: '#8B1010', glow: 'rgba(212,32,32,0.45)', glow2: 'rgba(212,32,32,0.18)', rgb: '212,32,32' };

/* ── Audio ── */
let audioCtx = null;
function playHoverSound() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc  = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); osc2.connect(gain); gain.connect(audioCtx.destination);
    osc.type = 'square'; osc2.type = 'sine';
    osc.frequency.setValueAtTime(520, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1040, audioCtx.currentTime + 0.08);
    osc2.frequency.setValueAtTime(780, audioCtx.currentTime);
    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.18);
    osc.start(audioCtx.currentTime); osc2.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.18); osc2.stop(audioCtx.currentTime + 0.18);
  } catch(e) {}
}

/* ── Image loading (multi-format) ── */
function loadImg(imgEl, slot, onDone, onFail) {
  const exts = ['jpg', 'jpeg', 'png', 'bmp', 'gif', 'webp'];
  let i = 0;
  function next() {
    if (i >= exts.length) { onFail && onFail(); return; }
    imgEl.onload  = () => { onDone && onDone(imgEl); };
    imgEl.onerror = next;
    imgEl.src = 'imagenes/Equipo-' + slot + '.' + exts[i++];
  }
  next();
}

/* ── Accent theme update ── */
function setAccent(ia) {
  const c = IA_CONFIG[ia] || DEFAULT_IA;
  const r = document.documentElement;
  r.style.setProperty('--accent',       c.color);
  r.style.setProperty('--accent-light', c.color);
  r.style.setProperty('--accent-dim',   c.dim);
  r.style.setProperty('--accent-glow',  c.glow);
  r.style.setProperty('--accent-glow2', c.glow2);
  r.style.setProperty('--accent-rgb',   c.rgb);
  /* Re-animate bars with new color */
  document.querySelectorAll('.bar-fill').forEach(el => {
    el.style.background = 'linear-gradient(90deg,' + c.dim + ',' + c.color + ')';
  });
}

/* ── Center panel update on hover ── */
let lastSlot = null;
function onCharHover(equipo) {
  playHoverSound();
  const ia = IA_CONFIG[equipo.ia] || DEFAULT_IA;
  setAccent(equipo.ia);

  /* AI label */
  const label = document.getElementById('ai-name-display');
  label.textContent = ia.nombre || '';
  label.style.color = ia.color;
  label.style.textShadow = '0 0 22px ' + ia.color + ', 0 0 6px ' + ia.color;
  label.classList.add('visible');

  /* Hide 'Choose your AI' text */
  document.getElementById('choose-text').style.opacity = '0';

  /* Center image */
  const panel = document.getElementById('center-panel');
  panel.style.borderColor = ia.color + '88';
  panel.style.boxShadow   = '0 0 24px ' + ia.glow + ', 0 0 6px ' + ia.glow;

  if (lastSlot !== equipo.slot) {
    lastSlot = equipo.slot;
    const img = document.getElementById('center-img');
    img.classList.remove('loaded');
    loadImg(img, equipo.slot,
      (el) => { el.classList.add('loaded'); },
      ()    => { img.classList.remove('loaded'); }
    );
  }
}

/* ── Build competitor card ── */
function buildCard(equipo) {
  const ia = IA_CONFIG[equipo.ia] || DEFAULT_IA;
  const card = document.createElement('div');
  card.className = 'char-card';
  card.style.borderColor = ia.color + '55';

  const inner = document.createElement('div');
  inner.className = 'card-inner';

  const img = document.createElement('img');
  img.alt = equipo.nombre;

  const initEl = document.createElement('div');
  initEl.className = 'card-initials';
  initEl.textContent = equipo.nombre.split(/\s+/).map(w => w[0]).join('').substring(0, 2).toUpperCase();

  loadImg(img, equipo.slot,
    () => { initEl.style.display = 'none'; img.style.display = 'block'; },
    () => { img.style.display = 'none'; initEl.style.display = 'flex'; }
  );

  inner.appendChild(img);
  inner.appendChild(initEl);
  card.appendChild(inner);

  card.addEventListener('mouseenter', () => {
    onCharHover(equipo);
    card.style.borderColor = ia.color;
    card.style.boxShadow   = '0 0 22px ' + ia.glow + ', 0 0 8px ' + ia.glow;
  });
  card.addEventListener('mouseleave', () => {
    card.style.borderColor = ia.color + '55';
    card.style.boxShadow   = '';
  });

  return card;
}

/* ── Render competitors ── */
function renderCompetitors() {
  const slotMap = {};
  DATA.equipos.forEach(e => { slotMap[e.slot] = e; });

  const colLeft  = document.getElementById('col-left');
  const colRight = document.getElementById('col-right');

  DATA.categorias.forEach((cat, idx) => {
    const isLeft = idx === 0 || idx === 2;
    const group  = document.createElement('div');
    group.className = 'cat-group';

    const lbl = document.createElement('div');
    lbl.className = 'cat-label';
    lbl.textContent = cat.label;
    group.appendChild(lbl);

    const row = document.createElement('div');
    row.className = 'cards-row';

    cat.slots.forEach(slot => {
      const equipo = slotMap[slot];
      if (!equipo) return;
      row.appendChild(buildCard(equipo));
    });

    group.appendChild(row);
    (isLeft ? colLeft : colRight).appendChild(group);
  });

  /* Operators */
  const ops  = document.getElementById('ops-panel');
  const op   = DATA.operadores;
  ops.innerHTML =
    '<div class="ops-title">OPERATORS:</div>' +
    '<div class="ops-name">' + op.op1 + '</div>' +
    '<div class="ops-name">' + op.op2 + '</div>' +
    '<div class="ops-name ops-name-3">' + op.op3 + '</div>' +
    '<div class="ops-credit">* Diseño de personaje: <strong>' + op.op3 + '</strong></div>';
}

/* ── Render leaderboard ── */
function renderLeaderboard() {
  const sorted = [...DATA.equipos].sort((a, b) => b.puntos - a.puntos);
  const maxPts = sorted[0]?.puntos || 1;
  const lb = document.getElementById('leaderboard');

  lb.innerHTML = sorted.map((eq, i) => {
    const rank     = i + 1;
    const isFinal  = rank <= 4;
    const pct      = Math.round((eq.puntos / maxPts) * 100);
    const rankCls  = (rank === 1 ? ' rank-1' : '') + (isFinal ? ' finals' : '');
    const delay    = (i * 55) + 'ms';
    const initials = eq.nombre.split(/\s+/).map(w => w[0]).join('').substring(0, 2).toUpperCase();
    const imgSrc   = 'imagenes/equipo-' + eq.slot + '.jpg'; /* will be retried in JS */

    return '<div class="board-entry' + rankCls + '" style="animation-delay:' + delay + '">' +
      '<div class="rank-num">' + rank + '</div>' +
      '<div class="team-avatar">' +
        '<img src="' + imgSrc + '" alt="' + eq.nombre + '" ' +
          'onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'">' +
        '<span style="display:none;width:100%;height:100%;align-items:center;justify-content:center;font-family:Rajdhani,sans-serif;font-size:1rem;font-weight:700;">' + initials + '</span>' +
      '</div>' +
      '<div class="team-info">' +
        '<div class="team-name">' + eq.nombre + '</div>' +
        '<div class="bar-track"><div class="bar-fill" data-pct="' + pct + '"></div></div>' +
        '<div class="finals-tag">Clasifica a la Final</div>' +
      '</div>' +
      '<div class="points-col">' +
        '<div class="points-num">' + eq.puntos.toLocaleString() + '</div>' +
        '<div class="points-label">pts</div>' +
      '</div>' +
    '</div>';
  }).join('');

  /* Animate bars */
  requestAnimationFrame(() => {
    setTimeout(() => {
      document.querySelectorAll('.bar-fill').forEach(el => {
        el.style.width = el.dataset.pct + '%';
      });
    }, 100);
  });
}

/* ── Render header + chips + video + descriptions ── */
function renderPage() {
  const { info, descripcion, infoAdicional } = DATA;
  document.getElementById('hd-edition').textContent = info.edition;
  document.getElementById('ft-org').textContent     = info.organizer;

  const chips = [
    { label: 'Sede',    value: info.location },
    { label: 'Horario', value: info.time },
    { label: 'Equipos', value: DATA.equipos.length + ' participantes' }
  ].filter(c => c.value);

  document.getElementById('info-strip').innerHTML = chips.map(c =>
    '<div class="info-chip"><div class="label">' + c.label + '</div><div class="value">' + c.value + '</div></div>'
  ).join('');

  /* Video */
  const vs  = document.getElementById('video-section');
  const ytId = (info.youtube || '').match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/);
  if (ytId) {
    vs.innerHTML = '<iframe class="yt-iframe" src="https://www.youtube.com/embed/' + ytId[1] +
      '" title="' + (info.videoTitle || 'Video') + '" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen loading="lazy"></iframe>';
  } else {
    vs.innerHTML = '<div class="video-placeholder" onclick="window.open(\'' + info.youtube + '\',\'_blank\')">' +
      '<div class="play-btn"><svg width="20" height="20" viewBox="0 0 20 20" fill="#fff"><polygon points="6,3 17,10 6,17"/></svg></div>' +
      '<p class="video-title-text">' + (info.videoTitle || 'Ver Video') + '</p></div>';
  }

  document.getElementById('event-desc').innerHTML  = '<p>' + descripcion.trim() + '</p>';
  document.getElementById('event-extra').innerHTML = '<p>' + infoAdicional.trim() + '</p>';
}

/* ── Init ── */
renderPage();
renderCompetitors();
renderLeaderboard();
</script>
